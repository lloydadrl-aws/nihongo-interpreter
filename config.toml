# ICA new-chat url
[ICA_URL]
base_url = "https://japan.ica.ibm.com/ica/curatorai/apps/ui/new-chat/"

# Path of your google chrome browser
[chrome]
chrome_path = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"

# Audio Settings
[audio]
source = "mic"
sample_rate = 16000
channels = 1
silence_duration = 1.5

[audio.devices]
mic = "Internal Microphone"
meeting_app = "CABLE Output"

[audio.mic]
threshold = 0.01
silence_duration = 1.5

[audio.meeting_app]
threshold = 0.002
silence_duration = 0.7